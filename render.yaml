services:
  - type: web
    name: descope-render
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir uv && uv sync --frozen
    startCommand:  uv run fastmcp run server.py:mcp --transport streamable-http --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    envVars:
      - key: DESCOPE_CONFIG_URL
        sync: false
